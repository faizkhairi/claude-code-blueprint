# Runs the installer test matrix on any change to setup.sh, the settings template,
# or the tests themselves. It exercises every preset across fresh / re-run / non-TTY /
# dry-run / piped scenarios and asserts the installer never crashes and never wires a
# hook it did not install. Catches the set -e / schema-drift / preset-mismatch bug class.
name: Install Test

on:
  push:
    branches: [main]
    paths:
      - "setup.sh"
      - "examples/settings-template.json"
      - "tests/**"
      - "hooks/**"
      - ".github/workflows/install-test.yml"
  # Runs on every PR (no path filter) so it can be a required status check:
  # a required check that is skipped on some PRs would block their merge forever.
  # The matrix is self-contained (it installs and tests regardless of the diff).
  pull_request:

permissions:
  contents: read

jobs:
  install-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run installer matrix
        run: bash tests/install-matrix.sh

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hook smoke tests
        run: bash hooks/test-hooks.sh
