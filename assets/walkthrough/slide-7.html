<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: #0a0a0a; color: #e4e4e7;
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
    padding: 0 96px;
    background-image: radial-gradient(ellipse 70% 50% at 50% 30%, rgba(124,58,237,0.10), transparent);
  }
  .badge {
    background: linear-gradient(135deg, #7c3aed, #3b82f6); color: #fff;
    font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    padding: 8px 18px; border-radius: 8px; margin-bottom: 32px;
  }
  h1 { font-size: 76px; font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 48px; }
  h1 .accent { background: linear-gradient(135deg, #818cf8, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .steps { display: flex; gap: 20px; margin-bottom: 44px; }
  .step {
    background: rgba(39,39,42,0.6); border: 1px solid #3f3f46; border-radius: 12px;
    padding: 20px 28px; min-width: 240px;
  }
  .step .n { font-size: 16px; font-weight: 700; color: #818cf8; margin-bottom: 6px; }
  .step .t { font-size: 16px; color: #a1a1aa; }
  .url { color: #7c3aed; font-size: 26px; font-weight: 700; margin-bottom: 24px; }
  .pills { display: flex; gap: 12px; }
  .pill { background: rgba(39,39,42,0.6); border: 1px solid #3f3f46; border-radius: 8px; padding: 8px 16px; font-size: 15px; color: #a1a1aa; }
  .footer {
    position: absolute; bottom: 40px; left: 96px; right: 96px;
    display: flex; justify-content: space-between; align-items: center; color: #52525b; font-size: 16px;
  }
</style>
</head>
<body>
  <div class="badge">● Get Started</div>
  <h1>Fork it. <span class="accent">Adapt it.</span><br>Make it <span class="accent">yours.</span></h1>
  <div class="steps">
    <div class="step"><div class="n">Step 1</div><div class="t">Copy CLAUDE.md to your project</div></div>
    <div class="step"><div class="n">Step 2</div><div class="t">Add 2-3 hooks from PRESETS.md</div></div>
    <div class="step"><div class="n">Step 3</div><div class="t">Read WHY.md &mdash; adapt, don't copy</div></div>
  </div>
  <div class="url">github.com/faizkhairi/claude-code-blueprint</div>
  <div class="pills"><span class="pill">MIT Licensed</span><span class="pill">PRs Welcome</span><span class="pill">JA / KO / ZH</span></div>
  <div class="footer"><span></span><span>7 / 7</span></div>
</body>
</html>
