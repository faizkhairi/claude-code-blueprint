<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: #0a0a0a; color: #e4e4e7;
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    display: flex; flex-direction: column; justify-content: center; padding: 0 96px;
    background-image: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(59,130,246,0.06), transparent);
  }
  h2 { font-size: 52px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 44px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 20px; }
  .card {
    background: linear-gradient(135deg, #18181b 0%, #1a1a2e 100%);
    border: 1px solid #27272a; border-radius: 16px; padding: 32px 28px;
  }
  .count {
    font-size: 56px; font-weight: 800;
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .label { font-size: 22px; font-weight: 600; color: #e4e4e7; margin-top: 4px; }
  .desc { font-size: 15px; color: #71717a; margin-top: 10px; line-height: 1.45; }
  .footer {
    position: absolute; bottom: 40px; left: 96px; right: 96px;
    display: flex; justify-content: space-between; align-items: center; color: #52525b; font-size: 16px;
  }
  .url { color: #7c3aed; font-weight: 600; }
</style>
</head>
<body>
  <h2>What's Inside</h2>
  <div class="grid">
    <div class="card"><div class="count">11</div><div class="label">Agents</div><div class="desc">Model tiering: opus / sonnet / haiku</div></div>
    <div class="card"><div class="count">17</div><div class="label">Skills</div><div class="desc">Natural-language triggers, no slash commands</div></div>
    <div class="card"><div class="count">10</div><div class="label">Hooks</div><div class="desc">Deterministic lifecycle automation</div></div>
    <div class="card"><div class="count">13</div><div class="label">Battle Stories</div><div class="desc">Every rule exists because something broke</div></div>
  </div>
  <div class="footer"><span class="url">github.com/faizkhairi/claude-code-blueprint</span><span>2 / 7</span></div>
</body>
</html>
